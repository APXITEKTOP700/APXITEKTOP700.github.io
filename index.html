<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Halava Game</title>
    <!-- Monetag SDK -->
    <script src='https://libtl.com/sdk.js' data-zone='10934105' data-sdk='show_10934105'></script>
    <!-- RichAds SDK -->
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <style>
        body { font-family: Arial; text-align: center; margin: 0; padding: 10px; }
        .tap-btn { width: 120px; height: 120px; border-radius: 50%; background: gold; font-size: 24px; border: none; cursor: pointer; margin: 20px auto; display: block; }
        .action-btn { padding: 15px 30px; margin: 10px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; width: 90%; max-width: 300px; }
        .wheel-btn { background: #ff5722; color: white; }
        .convert-btn { background: #9c27b0; color: white; }
        .ad-btn { background: #28a745; color: white; }
        .popup-btn { background: #007bff; color: white; }
        .richads-btn { background: #FF8C00; color: white; }
    </style>
</head>
<body>
    <h1>Halava Game 🎮</h1>
    <p>🪙 Монети: <span id="coins">0</span></p>
    <p>💎 Токени: <span id="tokens">0</span></p>
    <p>💰 Token3: <span id="token3">0</span></p>

    <button class="tap-btn" onclick="tap()">👆<br>TAP</button>
    <button class="action-btn wheel-btn" onclick="spinWheel()">🎰 Колесо фортуни (10 🪙)</button>
    <button class="action-btn convert-btn" onclick="convert()">🔄 Конвертувати в Token3<br>(1🪙 + 1💎 = 0.1💰)</button>
    
    <!-- RichAds кнопка -->
    <button class="action-btn richads-btn" onclick="showRichAd()">🤑 RichAds Бонус (+$0.005)</button>

    <!-- Monetag кнопки -->
    <button class="action-btn ad-btn" onclick="showRewardedAd()">🎥 Дивитись рекламу (+$0.005)</button>
    <button class="action-btn popup-btn" onclick="showRewardedPopup()">🚀 Швидкий бонус (+$0.005)</button>

    <p id="status" style="margin-top:20px; color:gray;">Очікування дії...</p>

    <script>
        // Ініціалізація RichAds
        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
            pubId: "1010302",
            appId: "7288",
        });

        // Допоміжна функція надсилання даних боту
        function sendToBot(data) {
            var s = document.getElementById('status');
            if (window.Telegram && window.Telegram.WebApp) {
                try {
                    window.Telegram.WebApp.sendData(JSON.stringify(data));
                    s.textContent = '✅ Дані надіслано!';
                    return true;
                } catch (e) {
                    s.textContent = '❌ Помилка: ' + e.message;
                    return false;
                }
            } else {
                s.textContent = '❌ Відкрийте через кнопку бота';
                return false;
            }
        }

        // Функція показу RichAds з очікуванням готовності
        function showRichAd() {
            var statusEl = document.getElementById('status');
            statusEl.textContent = '⏳ Завантаження RichAds...';
            
            var attempts = 0;
            var maxAttempts = 20; // спробувати 20 разів (10 секунд)
            
            function tryShow() {
                if (window.TelegramAdsController && typeof window.TelegramAdsController.show === 'function') {
                    window.TelegramAdsController.show()
                        .then(function() {
                            if (sendToBot({ action: 'reward_earned', amount: 0.005 })) {
                                statusEl.textContent = '✅ RichAds бонус зараховано!';
                            }
                        })
                        .catch(function(err) {
                            statusEl.textContent = 'Помилка RichAds: ' + err;
                            console.error(err);
                        });
                } else if (attempts < maxAttempts) {
                    attempts++;
                    setTimeout(tryShow, 500); // чекаємо 0.5 секунди
                } else {
                    statusEl.textContent = 'RichAds не готовий. Оновіть сторінку та спробуйте пізніше.';
                }
            }
            
            tryShow();
        }

        // Тапалка
        function tap() {
            document.getElementById('status').textContent = '👆 Тап...';
            if (sendToBot({ action: 'tap' })) {
                let c = document.getElementById('coins');
                c.textContent = parseInt(c.textContent) + 1;
            }
        }

        // Колесо фортуни
        function spinWheel() {
            document.getElementById('status').textContent = '🎰 Обертаємо...';
            sendToBot({ action: 'wheel_spin' });
        }

        // Конвертація валют
        function convert() {
            document.getElementById('status').textContent = '🔄 Конвертуємо...';
            sendToBot({ action: 'convert' });
        }

        // Monetag Interstitial
        function showRewardedAd() {
            document.getElementById('status').textContent = '⏳ Завантаження реклами Monetag...';
            show_10934105()
                .then(function() {
                    if (sendToBot({ action: 'reward_earned', amount: 0.005 })) {
                        document.getElementById('status').textContent = '✅ Токени зараховано!';
                    }
                })
                .catch(function(err) {
                    document.getElementById('status').textContent = 'Помилка: ' + err;
                    console.error(err);
                });
        }

        // Monetag Popup
        function showRewardedPopup() {
            document.getElementById('status').textContent = '⏳ Завантаження пропозиції...';
            show_10934105('pop')
                .then(function() {
                    if (sendToBot({ action: 'reward_earned', amount: 0.005 })) {
                        document.getElementById('status').textContent = '✅ Бонус зараховано!';
                    }
                })
                .catch(function(err) {
                    document.getElementById('status').textContent = 'Помилка: ' + err;
                    console.error(err);
                });
        }
    </script>
</body>
</html>
