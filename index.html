<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Halava Bot - Заробіток</title>
    
    <!-- Підключення Monetag SDK з вашим ZONE_ID -->
    <script src='https://libtl.com/sdk.js' data-zone='10934105' data-sdk='show_10934105'></script>
</head>
<body>
    <h1>🎁 Halava Bot</h1>
    <p>Заробляйте токени за перегляд реклами!</p>
    
    <button onclick="showRewardedAd()" style="padding: 15px 30px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer;">
        🎥 Дивитись рекламу (+$0.005)
    </button>

    <p id="status" style="margin-top: 20px; color: gray;">Очікування дії...</p>

    <script>
        // Функція для показу реклами
        function showRewardedAd() {
            var statusElement = document.getElementById('status');
            statusElement.textContent = '⏳ Завантаження реклами...';

            // Виклик методу монетизації з винагородою
            monetag.showRewardedInterstitial()
                .then(function() {
                    // Успішний перегляд реклами
                    statusElement.textContent = '✅ Рекламу переглянуто! Нарахування +$0.005';
                    
                    // Відправляємо дані нашому Python-боту
                    window.Telegram.WebApp.sendData(JSON.stringify({
                        action: 'reward_earned',
                        amount: 0.005
                    }));
                })
                .catch(function(error) {
                    // Помилка або користувач закрив рекламу раніше
                    statusElement.textContent = 'Помилка показу реклами. Спробуйте пізніше.';
                    console.error("Помилка Monetag:", error);
                });
        }
    </script>
</body>
</html>
